{% extends "base.html" %}
{% load static wagtailcore_tags wagtailimages_tags %}

{% block content %}

<h1 class="mb-12 text-4xl italic text-center leading-none tracking-tight text-gray-900 md:text-5xl lg:text-6xl dark:text-white"  style="font-family: dancing; font-size: 6rem;">
    {{ page.title }}
</h1>

<h3 class="mb-12 text-4xl text-center leading-none tracking-tight text-gray-900 dark:text-white">
    {{ page.description|richtext }}
</h3>

{% for article in articles %}
<div class="xl:grid grid-cols-3">
    <div class="card mx-auto bg-base-100 w-80 h-96 my-12 shadow-xl">
        <figure>
            {% with thumbnail_image=article.specific.main_image %}
                {% if thumbnail_image %}
                    {% image thumbnail_image fill-300x200 %}
                {% endif %}
            {% endwith %}
        </figure>
        <div class="card-body">
            <p>{{ article.title }}</p>
            <div class="card-actions justify-end">
            <button class="btn"><a href="{{ article.url }}">Voir le produit</a></button>
            </div>
        </div>
    </div>
</div>
{% endfor %}

{% endblock content %}
